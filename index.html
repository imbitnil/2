<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home - Rupesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0e0d0b;--paper:#f7f5f0;--cream:#ede9e1;--sidebar:#0d1117;
  --accent:#3b82f6;--accent-lt:#93c5fd;--muted:#7a756d;--border:#d8d2c8;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --serif:"Libre Baskerville",Georgia,serif;
  --sans:"IBM Plex Sans",sans-serif;
  --mono:"IBM Plex Mono",monospace;
}
html{scroll-behavior:smooth;}
html,body{overflow-x:hidden;max-width:100%;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;line-height:1.6;}
canvas{display:block;width:100%!important;height:auto;}
#wrapper{display:flex;min-height:100vh;overflow-x:hidden;width:100%;}
.marquee-bleed{width:100vw;position:relative;left:50%;transform:translateX(-50%);}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--sidebar);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s ease;overflow-y:auto;}
.sb-profile{padding:1.8rem 2rem 1.4rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;}
.sb-avatar{width:76px;height:76px;border-radius:0;object-fit:cover;object-position:center top;border:2.5px solid var(--accent);margin-bottom:0.9rem;display:block;flex-shrink:0;background:linear-gradient(135deg,#1e3a5f,#3b82f6);display:flex;align-items:center;justify-content:center;}
.sb-avatar-initials{font-family:var(--mono);font-size:1.4rem;font-weight:500;color:#fff;letter-spacing:0.05em;}
.sb-name{font-family:var(--serif);font-size:1.08rem;font-weight:700;color:#f7f5f0;letter-spacing:-0.01em;}
.sb-role{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-lt);margin-top:0.22rem;font-family:var(--mono);}

/* Progress tracker in sidebar */
.sb-progress{padding:0.9rem 1.6rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.sb-progress-label{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(247,245,240,0.2);margin-bottom:0.6rem;}
.term-row{display:flex;justify-content:space-between;align-items:center;padding:0.2rem 0;}
.term-name{font-family:var(--mono);font-size:0.62rem;color:rgba(247,245,240,0.38);letter-spacing:0.04em;}
.term-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,0.06);margin:0 0.6rem;border-radius:2px;}
.term-bar{height:3px;border-radius:2px;background:var(--accent);}
.term-score{font-family:var(--mono);font-size:0.58rem;color:rgba(247,245,240,0.55);}

.sb-nav{flex:1;padding:1.1rem 0;}
.sb-nav-label{font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(247,245,240,0.2);padding:0 1.6rem 0.5rem;font-family:var(--mono);}
.sb-nav-link{display:flex;align-items:center;gap:0.72rem;padding:0.52rem 1.6rem;font-size:0.8rem;font-weight:400;color:rgba(247,245,240,0.42);cursor:pointer;transition:color 0.2s,background 0.2s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);letter-spacing:0.01em;}
.sb-nav-link:hover,.sb-nav-link.active{color:#f7f5f0;background:rgba(255,255,255,0.04);}
.sb-nav-link.active{color:var(--accent-lt);border-right:2px solid var(--accent);}
.sb-nav-link svg{width:14px;height:14px;flex-shrink:0;opacity:0.4;}
.sb-nav-link.active svg,.sb-nav-link:hover svg{opacity:1;}

.sb-minichart{padding:1rem 1.6rem;border-top:1px solid rgba(255,255,255,0.07);}
.sb-minichart-label{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,245,240,0.2);margin-bottom:0.55rem;}
.sb-quote{padding:1.1rem 1.6rem;border-top:1px solid rgba(255,255,255,0.07);}
.sb-quote-text{font-family:var(--serif);font-style:italic;font-size:0.74rem;line-height:1.6;color:rgba(247,245,240,0.32);}
.sb-quote-attr{font-size:0.58rem;font-family:var(--mono);color:rgba(147,197,253,0.4);margin-top:0.55rem;letter-spacing:0.06em;}

/* MAIN */
#main{margin-left:280px;flex:1;min-height:100vh;min-width:0;}
#topbar{position:sticky;top:0;z-index:50;background:rgba(247,245,240,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;padding:0 3rem;height:52px;}
.topbar-breadcrumb{font-family:var(--mono);font-size:0.64rem;color:var(--muted);letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.topbar-cta{padding:0.4rem 1.05rem;background:var(--ink);color:var(--paper);border:none;font-family:var(--sans);font-size:0.68rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.topbar-cta:hover{background:var(--accent);color:#fff;}
#mob-toggle{display:none;background:none;border:none;padding:0.35rem 0.4rem;cursor:pointer;line-height:0;flex-shrink:0;order:-1;}
#mob-toggle span{display:block;width:20px;height:1.5px;background:var(--ink);margin:4px 0;transition:all 0.3s;}
#content{padding:3rem;max-width:960px;overflow-x:hidden;}
#content *{max-width:100%;}

@media(max-width:1024px){
  #sidebar{width:240px;}
  #main{margin-left:240px;}
  #topbar{padding:0 2rem;}
  #content{padding:2rem;max-width:100%;}
  .sec-title{font-size:clamp(1.5rem,2.5vw,2.5rem);}
}
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;transform:translateX(-100%);z-index:200;}
  #sidebar.open{transform:translateX(0);box-shadow:8px 0 32px rgba(0,0,0,0.45);}
  #main{margin-left:0;}
  #mob-toggle{display:block;}
  #topbar{padding:0 1rem;}
  #content{padding:1.2rem 1rem;max-width:100%;}
  .about-grid,.contact-grid,.nl-block,.card-grid,.book-grid,.form-row{grid-template-columns:1fr!important;}
  .res-grid{grid-template-columns:repeat(2,1fr);}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .chart-wrap{padding:0.85rem 0.75rem;}
  .chart-header{flex-direction:column;gap:0.48rem;}
  .post-item{grid-template-columns:1fr;gap:0.65rem;}
  .post-arr{display:none;}
  .featured-post{padding:1.3rem;}
  .featured-post .post-ttl{font-size:1.15rem!important;}
  .nl-block{padding:1.7rem 1.3rem;}
  .photo-box{aspect-ratio:4/3;}
  .sec-title{font-size:clamp(1.55rem,6vw,2.3rem)!important;}
  .sb-avatar{width:62px;height:62px;}
}
@media(max-width:480px){
  #content{padding:1rem 0.85rem;}
  .res-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .sec-title{font-size:clamp(1.2rem,5vw,1.8rem)!important;}
  p{word-break:break-word;}
  .pullquote p{font-size:0.85rem;}
  .chart-wrap{display:none;}
  .contact-form{padding:0;}
  .form-row{grid-template-columns:1fr;}
}

#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;transition:opacity 0.3s;}
#sidebar-overlay.active{display:block;opacity:1;}
.page{animation:pageIn 0.35s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.55s ease,transform 0.55s ease;}
.reveal.visible{opacity:1;transform:none;}

.sec-eyebrow{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:0.7rem;margin-bottom:0.75rem;}
.sec-eyebrow::after{content:"";flex:0 0 22px;height:1px;background:var(--accent);}
.sec-title{font-family:var(--serif);font-size:clamp(2rem,3.5vw,3.2rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin-bottom:1.25rem;}

.pullquote{border-left:2px solid var(--accent);padding:0.72rem 1.25rem;margin:2rem 0;background:rgba(59,130,246,0.04);}
.pullquote p{font-family:var(--serif);font-style:italic;font-size:0.96rem;line-height:1.65;color:#3a3530;}
.pullquote cite{display:block;font-family:var(--mono);font-size:0.62rem;color:var(--muted);margin-top:0.42rem;letter-spacing:0.06em;font-style:normal;}

/* CHARTS */
.chart-wrap{background:var(--sidebar);border:1px solid #1e2a3a;padding:1.4rem;margin:1.8rem 0;position:relative;overflow:hidden;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.9rem;}
.chart-ticker{font-family:var(--mono);font-size:0.8rem;font-weight:500;color:#f7f5f0;letter-spacing:0.06em;}
.chart-price{font-family:var(--mono);font-size:1.3rem;font-weight:500;color:#f7f5f0;margin-top:0.08rem;}
.chart-change{font-family:var(--mono);font-size:0.68rem;padding:2px 7px;border-radius:2px;display:inline-block;margin-top:0.18rem;}
.chg-up{background:rgba(16,185,129,0.14);color:var(--green);}
.chg-dn{background:rgba(239,68,68,0.14);color:var(--red);}
.chart-period-btns{display:flex;gap:0.38rem;flex-wrap:wrap;}
.period-btn{font-family:var(--mono);font-size:0.58rem;padding:2px 7px;border:1px solid rgba(255,255,255,0.1);background:none;color:rgba(247,245,240,0.38);cursor:pointer;transition:all 0.15s;}
.period-btn.active,.period-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin:2.2rem 0;}
.stat-cell{background:var(--paper);padding:1.3rem;}
.stat-num{font-family:var(--serif);font-size:2rem;font-weight:700;line-height:1;letter-spacing:-0.02em;}
.stat-lbl{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:0.32rem;}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-top:1.8rem;}
.card-item{background:var(--paper);padding:1.7rem;}
.card-num{font-family:var(--serif);font-size:2.6rem;font-weight:700;color:var(--border);line-height:1;}
.card-title{font-family:var(--serif);font-size:1rem;font-weight:700;margin:0.4rem 0 0.45rem;}
.card-body{font-size:0.83rem;color:var(--muted);line-height:1.75;}

/* MARQUEE */
.marquee-bar{background:var(--sidebar);padding:0.68rem 0;overflow:hidden;white-space:nowrap;}
.marquee-inner{display:inline-flex;animation:marquee 30s linear infinite;}
.marquee-inner span{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(247,245,240,0.26);padding:0 1.8rem;}
.marquee-inner span.ma{color:var(--accent-lt);}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* POSTS */
.post-list{margin-top:1.4rem;}
.post-item{display:grid;grid-template-columns:1fr auto;gap:1.4rem;align-items:center;padding:1.5rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding-left 0.2s;}
.post-item:first-child{border-top:1px solid var(--border);}
.post-item:hover{padding-left:0.55rem;}
.post-tag{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:0.32rem;}
.post-ttl{font-family:var(--serif);font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:0.32rem;}
.post-exc{font-size:0.83rem;color:var(--muted);line-height:1.7;max-width:520px;}
.post-meta{font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:0.06em;margin-top:0.32rem;}
.post-arr{color:var(--muted);}
.featured-post{border:1px solid var(--border);padding:1.8rem;cursor:pointer;transition:border-color 0.2s,background 0.2s;}
.featured-post:hover{border-color:var(--accent);background:rgba(59,130,246,0.02);}
.featured-post .post-tag{margin-bottom:0.55rem;}
.featured-post .post-ttl{font-family:var(--serif);font-size:1.55rem;font-weight:700;line-height:1.25;}
.filters{display:flex;gap:0.38rem;flex-wrap:wrap;margin-bottom:1rem;}
.filter-btn{font-family:var(--mono);font-size:0.6rem;padding:4px 10px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);transition:all 0.15s;letter-spacing:0.08em;text-transform:uppercase;}
.filter-btn.active,.filter-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* NEWSLETTER */
.nl-block{background:var(--sidebar);padding:2.4rem;margin-top:2.8rem;display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;}
.nl-title{font-family:var(--serif);font-size:1.75rem;font-weight:700;color:#f7f5f0;line-height:1.2;margin-bottom:0.52rem;}
.nl-sub{font-size:0.83rem;color:rgba(247,245,240,0.42);line-height:1.8;}
.nl-form{display:flex;flex-direction:column;gap:0.6rem;}
.nl-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:0.72rem 1rem;font-family:var(--sans);font-size:0.84rem;color:#f7f5f0;outline:none;transition:border-color 0.2s;}
.nl-input::placeholder{color:rgba(247,245,240,0.22);}
.nl-input:focus{border-color:var(--accent);}
.nl-btn{background:var(--accent);color:#fff;border:none;padding:0.78rem;font-family:var(--sans);font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.nl-btn:hover{background:#2563eb;}
.nl-note{font-family:var(--mono);font-size:0.56rem;color:rgba(247,245,240,0.16);letter-spacing:0.05em;}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.photo-box{background:var(--sidebar);aspect-ratio:3/4;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.photo-box img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.photo-box-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.15);font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;gap:0.8rem;}
.photo-box-placeholder svg{width:40px;height:40px;opacity:0.2;}
.photo-box-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent);}
.photo-box-tag{position:absolute;bottom:1.3rem;left:1.3rem;background:rgba(247,245,240,0.95);padding:0.8rem 1.05rem;border-left:2px solid var(--accent);}
.photo-box-tag strong{font-size:0.8rem;font-weight:600;}
.photo-box-tag span{display:block;font-family:var(--mono);font-size:0.58rem;color:var(--muted);letter-spacing:0.06em;margin-top:0.16rem;}
.about-body{font-size:0.93rem;line-height:1.9;color:#3d3930;}
.about-body p+p{margin-top:1.05rem;}
.rules-list{margin-top:2rem;display:flex;flex-direction:column;gap:0.7rem;}
.rule-item{display:flex;gap:0.9rem;padding:0.85rem 1.05rem;border:1px solid var(--border);align-items:flex-start;}
.rule-n{font-family:var(--serif);font-size:1.15rem;font-weight:700;color:var(--accent);line-height:1;flex-shrink:0;}
.rule-item p{font-size:0.84rem;line-height:1.75;color:#4a463f;}

/* SKILLS / RESOURCES */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:1.8rem;}
.res-card{background:var(--paper);padding:1.7rem;transition:background 0.2s;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.res-card:hover{background:#f0ece3;}
.res-icon{width:32px;height:32px;color:var(--accent);margin-bottom:1rem;}
.res-title{font-family:var(--serif);font-size:0.98rem;font-weight:700;margin-bottom:0.42rem;}
.res-body{font-size:0.79rem;color:var(--muted);line-height:1.7;}
.res-link{display:inline-block;font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-top:0.85rem;}
.books-section{margin-top:3.8rem;}
.books-section h2{font-family:var(--serif);font-size:1.7rem;font-weight:700;margin-bottom:1.3rem;}
.book-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);}
.book-item{background:var(--paper);padding:1.05rem;display:flex;gap:0.9rem;align-items:flex-start;}
.book-n{font-family:var(--serif);font-size:1.6rem;font-weight:700;color:var(--border);line-height:1;flex-shrink:0;}
.book-info h4{font-family:var(--serif);font-size:0.88rem;font-weight:700;margin-bottom:0.16rem;}
.book-info span{font-family:var(--mono);font-size:0.61rem;color:var(--muted);}
.book-info p{font-size:0.76rem;color:var(--muted);margin-top:0.32rem;line-height:1.6;}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.contact-body{font-size:0.91rem;line-height:1.85;color:#3d3930;}
.contact-body p+p{margin-top:1rem;}
.channels{display:flex;flex-direction:column;gap:0.65rem;margin-top:1.7rem;}
.channel{display:flex;align-items:center;gap:0.9rem;padding:0.8rem 1.05rem;border:1px solid var(--border);text-decoration:none;color:inherit;transition:border-color 0.2s;}
.channel:hover{border-color:var(--accent);}
.channel svg{width:16px;height:16px;flex-shrink:0;color:var(--muted);}
.channel-name{font-size:0.72rem;font-weight:600;letter-spacing:0.04em;}
.channel-val{font-family:var(--mono);font-size:0.64rem;color:var(--muted);margin-top:0.1rem;}
.contact-form{display:flex;flex-direction:column;gap:0.62rem;}
.contact-form h3{font-family:var(--serif);font-size:1.2rem;font-weight:700;margin-bottom:0.38rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.62rem;}
.f-input{background:var(--cream);border:1px solid var(--border);padding:0.78rem 1rem;font-family:var(--sans);font-size:0.84rem;color:var(--ink);outline:none;transition:border-color 0.2s;width:100%;}
.f-input::placeholder{color:var(--muted);}
.f-input:focus{border-color:var(--accent);}
textarea.f-input{resize:vertical;min-height:105px;}
.f-btn{background:var(--ink);color:var(--paper);border:none;padding:0.84rem;font-family:var(--sans);font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.f-btn:hover{background:var(--accent);color:#fff;}

/* POST */
.post-back{display:inline-flex;align-items:center;gap:0.48rem;font-family:var(--mono);font-size:0.64rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:1.3rem;transition:color 0.2s;padding:0;}
.post-back:hover{color:var(--ink);}
.post-back svg{width:12px;height:12px;}
.post-header{border-bottom:1px solid var(--border);padding-bottom:1.7rem;margin-bottom:1.9rem;}
.post-tag-line{font-family:var(--mono);font-size:0.61rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:0.65rem;}
.post-main-title{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em;}
.post-byline{display:flex;align-items:center;gap:0.85rem;margin-top:1.3rem;font-family:var(--mono);font-size:0.64rem;color:var(--muted);letter-spacing:0.04em;flex-wrap:wrap;}
.post-byline strong{color:var(--ink);font-weight:500;}
.post-content{font-size:0.98rem;line-height:1.9;color:#2d2a25;max-width:680px;}
.post-content p{margin-bottom:1.25rem;}
.post-content h2{font-family:var(--serif);font-size:1.45rem;font-weight:700;margin:2.3rem 0 0.85rem;}
.post-content blockquote{border-left:2px solid var(--accent);padding:0.62rem 1.25rem;margin:1.5rem 0;background:rgba(59,130,246,0.04);}
.post-content blockquote p{font-family:var(--serif);font-style:italic;font-size:0.96rem;margin:0;}

const POSTS=[
  {id:"stat2",tag:"Statistics",read:"7 min",date:"Apr 8, 2025",
   title:"Why Bayes' Theorem Broke My Brain (And Then Fixed It)",
   excerpt:"I spent three weeks confused by conditional probability. Here's the intuition that finally made it click — and how it changed the way I approach data.",
   body:`<p>The IITM statistics course hit me hard in Term 2. I could solve the formulas mechanically, but I had no intuition for what Bayes was actually saying.</p><h2>The Insight That Changed Everything</h2><p>Bayes' theorem is just a recipe for updating your beliefs when you get new information. Prior belief + new evidence = updated belief. That's it. The formula is just making this precise.</p><blockquote><p>All statistical inference is, at its core, learning from data to reduce uncertainty.</p></blockquote><h2>Why This Matters for Data Science</h2><p>Once you understand that probability is a measure of belief, not just frequency, you start asking better questions. Not "what's the probability this coin is fair?" but "given what I've observed, how much should I believe this coin is fair?"</p><h2>How I Applied It</h2><p>I built a small spam classifier using naive Bayes on the IITM assignment dataset. The model was surprisingly good — 94% accuracy — and building it from scratch made the math feel alive for the first time.</p>`},
  {id:"python1",tag:"Programming",read:"5 min",date:"Mar 22, 2025",
   title:"From Beginner to Term 1: What Python Actually Teaches You (It's Not Syntax)",
   excerpt:"The IITM Python course isn't really about Python. It's about how to think about problems. Here's what I wish someone had told me before I started.",
   body:`<p>I came into Term 1 having done some YouTube Python tutorials. I thought I knew what was coming. I was wrong.</p><h2>The Real Lesson</h2><p>The course teaches decomposition — breaking hard problems into small, solvable pieces. The programming is just the medium. The skill being built is thinking precisely.</p><blockquote><p>If you can't explain what your function does in one sentence, you don't understand the problem yet.</p></blockquote><h2>What Tripped Me Up</h2><p>Week 4, recursion. I stared at the screen for two hours before it clicked. The key was drawing the call stack on paper, not staring at the code.</p>`},
  {id:"ml1",tag:"Machine Learning",read:"9 min",date:"Mar 5, 2025",
   title:"Linear Regression Is Not Simple — And That's the Point",
   excerpt:"Everyone learns linear regression first. Very few people learn what it's actually assuming. Those assumptions are where real data science begins.",
   body:`<p>Term 3 introduced machine learning formally. The first model: linear regression. I'd seen it before. I thought I understood it. I did not.</p><h2>The Assumptions Nobody Talks About</h2><p>OLS regression assumes: linearity, independence of errors, homoscedasticity, and normality of residuals. Violate any of these and your confidence intervals are lies.</p><blockquote><p>A model is not right or wrong. It is either useful or not useful for the question you're asking.</p></blockquote><h2>What I Actually Learned</h2><p>The most important skill in regression isn't running the model. It's diagnosing whether the model is appropriate for your data in the first place. Residual plots, Q-Q plots, and leverage statistics — these are what separate cargo-cult ML from real analysis.</p>`},
  {id:"data_story",tag:"Data Storytelling",read:"6 min",date:"Feb 14, 2025",
   title:"The Chart That Lied to Me (And What I Did About It)",
   excerpt:"I made a visualisation for an assignment that was technically correct and completely misleading. Here's what the grader caught that I missed.",
   body:`<p>Term 3 statistics assignment: visualise a dataset of exam scores. I made a bar chart. It looked clean. I got marked down.</p><h2>The Problem</h2><p>My y-axis started at 60, not 0. This made a 3-point difference look like a massive gap. The grader pointed out that this is one of the most common ways data visualisations deceive — usually accidentally, sometimes deliberately.</p><blockquote><p>Every design choice in a chart is an argument. Make sure you know what argument you're making.</p></blockquote><h2>The Fix and the Lesson</h2><p>I rebuilt the chart with a zero baseline, and the story completely changed. The groups I thought were dramatically different were actually nearly identical. The data hadn't changed. My interpretation had.</p>`},
  {id:"grind",tag:"IITM Life",read:"11 min",date:"Jan 10, 2025",
   title:"Surviving Term 2: What 5 Assignments Per Week Does to a Person",
   excerpt:"An honest account of what the IITM workload looks like from the inside — the schedule, the mistakes, and what actually works.",
   body:`<p>Term 2 at IITM is where the program separates serious students from casual ones. I was almost in the second group.</p><h2>The Reality of the Workload</h2><p>In peak weeks I had graded assignments due in Mathematics for Data Science, Statistics 1, English 1, and the weekly programming assignments. Plus the live session quizzes.</p><blockquote><p>The goal is not to memorise content. The goal is to build the habit of working consistently, even when you don't feel like it.</p></blockquote><h2>What Actually Worked</h2><p>I started treating IITM like a job. Same hours, same desk, same start time every day. The variability was the enemy — not the difficulty.</p>`}

/* --- CANVAS DRAWING --- */
function setCanvasSize(c){
  const dpr=window.devicePixelRatio||1;
  const w=Math.round((c.parentElement?c.parentElement.clientWidth:500)||500);
  const h=parseInt(c.getAttribute("data-h")||c.getAttribute("height")||200);
  c.width=w*dpr;c.height=h*dpr;c.style.width="100%";c.style.height=h+"px";
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);return{W:w,H:h};
}

function drawLine(c,o){
  const{W,H}=setCanvasSize(c);const ctx=c.getContext("2d");
  const{data,color="#3b82f6",fill="rgba(59,130,246,0.08)",grid=true,pad=20}=o;
  ctx.clearRect(0,0,W,H);if(!data||data.length<2)return;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pl=pad,pr=10,pt=pad*0.5,pb=pad,cW=W-pl-pr,cH=H-pt-pb;
  const px=i=>pl+(i/(data.length-1))*cW,py=v=>pt+cH-((v-mn)/rng)*cH;
  if(grid){ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;for(let i=0;i<4;i++){const y=pt+(cH/3)*i;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(W-pr,y);ctx.stroke();}}
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.lineTo(px(data.length-1),pt+cH);ctx.lineTo(px(0),pt+cH);ctx.closePath();ctx.fillStyle=fill;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
  const lx=px(data.length-1),ly=py(data[data.length-1]);
  ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}

function trend(start,end,n,noise){
  return Array.from({length:n},(_,i)=>{const t=i/(n-1);return start+(end-start)*t+(Math.random()-0.5)*noise*(end-start);});
}

    if(mc)drawLine(mc,{data:trend(70,92,14,0.08),pad:20});
  }

    const ae=document.getElementById("about-equity");
    if(ae)drawLine(ae,{data:trend(6.2,8.4,40,0.035),pad:20});
  }
}
